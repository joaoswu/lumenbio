<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <title>Leaderboard · Lumenbio</title>
  <meta name="description" content="Check out the most viewed profiles and popular creators on Lumenbio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/shared/lumen.css?v=1.1.23">
  <link rel="stylesheet" href="/leaderboard/leaderboard.css?v=1.1.23">
</head>
<body>
  <div class="lumen-bg"></div>
  <div class="lumen-grid"></div>

  <!-- Dynamic island navbar -->
  <nav class="nav-island">
    <a class="nav-brand" href="/"><span class="logo"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M12 0l2.6 9.4L24 12l-9.4 2.6L12 24l-2.6-9.4L0 12l9.4-2.6z"/></svg></span><span class="brand-text">Lumenbio</span></a>
    <div class="nav-tabs">
      <a class="nav-tab" data-path="/" href="/"><i class="fas fa-house"></i><span class="tab-text">Home</span></a>
      <a class="nav-tab" href="/#features"><i class="fas fa-earth-americas"></i><span class="tab-text">Explore</span></a>
      <a class="nav-tab" data-path="/leaderboard" href="/leaderboard"><i class="fas fa-crown"></i><span class="tab-text">Leaderboard</span></a>
    </div>
    <a class="nav-cta" data-auth-cta href="/signup"><i class="fas fa-arrow-right-to-bracket"></i> Get Started</a>
  </nav>

  <main class="leaderboard-wrap">
    <header class="leaderboard-head">
      <div class="trophy-pulse"><i class="fas fa-crown"></i></div>
      <h1>Lumenbio <span class="grad">Leaderboard</span></h1>
      <p>The most viewed profiles and popular creators on the platform.</p>
      <div class="lb-search-wrap">
        <i class="fas fa-magnifying-glass"></i>
        <input type="search" id="lb-search" placeholder="Search creators by name or @username…" autocomplete="off">
      </div>
    </header>

    <section class="leaderboard-card glass">
      <div class="leaderboard-header">
        <span class="rank-col">Rank</span>
        <span class="profile-col">Profile</span>
        <span class="views-col">Views</span>
      </div>
      <div class="leaderboard-list" id="leaderboard-list">
        <!-- Rendered dynamically -->
        <div class="loading-state">
          <i class="fas fa-circle-notch fa-spin"></i> Loading top profiles…
        </div>
      </div>
    </section>
  </main>

  <script src="/shared/nav.js?v=1.1.22"></script>
  <script src="/leaderboard/leaderboard.js?v=1.1.23"></script>
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
