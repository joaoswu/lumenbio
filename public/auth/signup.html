<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <title>Sign up · Lumenbio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/shared/lumen.css?v=1.1.21">
  <link rel="stylesheet" href="/auth/auth.css?v=1.1.20">
</head>
<body>
  <div class="lumen-bg"></div>
  <div class="lumen-grid"></div>

  <div class="auth-wrap">
    <a class="auth-brand" href="/"><span class="logo"><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true"><path d="M12 0l2.6 9.4L24 12l-9.4 2.6L12 24l-2.6-9.4L0 12l9.4-2.6z"/></svg></span> Lumenbio</a>

    <div class="auth-card glass">
      <h1>Create your page</h1>
      <p class="auth-sub">Claim your username — it's free during early access.</p>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <i class="fas fa-at"></i>
            <input type="text" id="username" name="username" placeholder="yourname" autocomplete="username" maxlength="20" required>
          </div>
          <div class="field-hint" id="username-hint">Your page will be <b class="mono" id="url-preview">lumenbio/u/yourname</b></div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="you@email.com" autocomplete="email" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
            <button type="button" class="toggle-pass" data-target="password" aria-label="Show password"><i class="fas fa-eye"></i></button>
          </div>

          <div class="strength" id="strength" hidden>
            <div class="strength-bars"><span></span><span></span><span></span><span></span></div>
            <div class="strength-label" id="strength-label">Strength: <b>—</b></div>
            <ul class="strength-checks" id="strength-checks">
              <li data-k="length">8+ characters</li>
              <li data-k="upper">Uppercase</li>
              <li data-k="lower">Lowercase</li>
              <li data-k="number">Number</li>
              <li data-k="symbol">Symbol</li>
              <li data-k="long">12+ (bonus)</li>
            </ul>
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit" id="submit-btn">
          <i class="fas fa-wand-magic-sparkles"></i> Create my page
        </button>
        <div class="auth-error" id="auth-error" hidden></div>
        <p class="cap-note" id="cap-note"></p>
      </form>

      <p class="auth-alt">Already have a page? <a href="/login">Log in →</a></p>
    </div>
  </div>

  <script src="/shared/password-strength.js?v=1.1.20"></script>
  <script src="/auth/auth.js?v=1.1.20"></script>
</body>
</html>
